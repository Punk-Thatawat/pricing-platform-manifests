apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pricing-platform
  namespace: pricing-platform
spec:
  ingressClassName: nginx
  rules:
    - host: pricing-platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80